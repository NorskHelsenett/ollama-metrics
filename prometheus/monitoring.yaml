---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |-
    global:
      scrape_interval: 1m

    scrape_configs:
      - job_name: 'node'
        static_configs:
          - targets: ['localhost:9100']

      - job_name: 'ollama'
        scrape_interval: 15s
        static_configs:
          - targets: ['host.containers.internal:8080']

---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: ollama-monitoring
  name: ollama-monitoring
spec:
  containers:
    - name: node-exporter
      image: quay.io/prometheus/node-exporter:v1.9.1
      args:
        - --path.procfs=/host/proc
        - --path.rootfs=/rootfs
        - --path.sysfs=/host/sys
        - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      volumeMounts:
        - mountPath: /host/proc
          name: proc
          readOnly: true
        - mountPath: /host/sys
          name: sys
          readOnly: true
        - mountPath: /rootfs
          name: rootfs
          readOnly: true

    - name: prometheus
      image: quay.io/prometheus/prometheus:v3.4.1
      args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/etc/prometheus/console_libraries
        - --web.console.templates=/etc/prometheus/consoles
        - --web.enable-lifecycle
      ports:
        - containerPort: 9090
          hostPort: 9090
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
        - mountPath: /etc/prometheus/prometheus.yml
          name: prometheus-config
          subPath: prometheus.yml
        - mountPath: /prometheus
          name: prometheus-data

    - name: grafana
      image: docker.io/grafana/grafana:11.6.0
      env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
      ports:
        - containerPort: 3000
          hostPort: 3000
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      volumeMounts:
        - mountPath: /var/lib/grafana
          name: grafana-data

  volumes:
    - name: proc
      hostPath:
        path: /proc
    - name: sys
      hostPath:
        path: /sys
    - name: rootfs
      hostPath:
        path: /
    - name: prometheus-config
      configMap:
        name: prometheus-config
    - name: prometheus-data
      emptyDir: {}
    - name: grafana-data
      emptyDir: {}

  restartPolicy: Always
